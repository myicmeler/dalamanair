[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"
  NEXT_PUBLIC_APP_URL = "https://dalaman.me"

[[redirects]]
  from = "https://dalamanair.netlify.app/*"
  to = "https://dalaman.me/:splat"
  status = 301
  force = true
